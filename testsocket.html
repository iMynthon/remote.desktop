<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Remote Control</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        input, button { margin: 5px; padding: 8px; }
        #status { font-weight: bold; margin-left: 10px; }
        .connected { color: green; }
        .disconnected { color: red; }
        ul { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; border: 1px solid #ccc; }
        li { padding: 5px; border-bottom: 1px solid #eee; }
        .error { color: red; }
        .register-error { color: red; margin-top: 5px; }
    </style>
</head>
<body>
<h2>WebSocket Remote Control</h2>

<div>
    <label>Connection ID:</label>
    <input type="text" id="connectionId" placeholder="Enter numeric ID" value="10000">
    <button onclick="connect()" id="connectBtn">Connect</button>
    <button onclick="disconnect()" disabled id="disconnectBtn">Disconnect</button>
    <button onclick="register()" id="registerBtn">Register new connection</button>
    <span id="status" class="disconnected">Disconnected</span>
    <div id="registerError" class="register-error"></div>
</div>

<div>
    <input type="text" id="message" placeholder="Type a message" disabled>
    <button onclick="sendMessage()" disabled id="sendBtn">Send</button>
</div>

<div>
    <h3>Active clients (from server)</h3>
    <ul id="clientList"></ul>
</div>

<div>
    <h3>Messages</h3>
    <ul id="messages"></ul>
</div>

<script>
    let socket;
    const connectionIdInput = document.getElementById('connectionId');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const messageInput = document.getElementById('message');
    const statusSpan = document.getElementById('status');
    const messagesList = document.getElementById('messages');
    const clientList = document.getElementById('clientList');
    const registerErrorDiv = document.getElementById('registerError');

    function connect() {
        const connectionId = connectionIdInput.value.trim();
        if (!connectionId) {
            alert('Please enter connection ID');
            return;
        }
        // Проверка, что ID – число (т.к. бэк парсит Integer)
        if (!/^\d+$/.test(connectionId)) {
            alert('Connection ID must be a number');
            return;
        }

        socket = new WebSocket(`ws://localhost:5679/remote-control/${connectionId}`);

        socket.onopen = function() {
            log('System', 'Connected successfully');
            setConnectedState(true);
        };

        socket.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'clientList') {
                    updateClientList(data.clients);
                } else {
                    log('Received', event.data);
                }
            } catch (e) {
                log('Received', event.data);
            }
        };

        socket.onclose = function(event) {
            let reason = 'Disconnected';
            if (event.code === 4000) {
                reason = 'Connection refused: Client ID already in use';
            } else if (event.code === 401) { // Unauthorized – ID не найден
                reason = 'Connection refused: Connection ID not found';
            } else if (event.code === 1006) {
                reason = 'Connection lost (server unavailable?)';
            } else if (event.reason) {
                reason = event.reason;
            }
            log('System', reason);
            setConnectedState(false);
        };

        socket.onerror = function(error) {
            log('Error', 'WebSocket error occurred');
        };
    }

    function disconnect() {
        if (socket) {
            socket.close(1000, 'User disconnected');
        }
    }

    function sendMessage() {
        const msg = messageInput.value.trim();
        if (msg && socket && socket.readyState === WebSocket.OPEN) {
            socket.send(msg);
            log('Sent', msg);
            messageInput.value = '';
        }
    }

    function setConnectedState(connected) {
        if (connected) {
            statusSpan.textContent = 'Connected as ' + connectionIdInput.value;
            statusSpan.className = 'connected';
            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            sendBtn.disabled = false;
            messageInput.disabled = false;
            registerBtn.disabled = true; // запретим регистрацию во время подключения
        } else {
            statusSpan.textContent = 'Disconnected';
            statusSpan.className = 'disconnected';
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            sendBtn.disabled = true;
            messageInput.disabled = true;
            registerBtn.disabled = false;
        }
    }

    function log(sender, message) {
        const li = document.createElement('li');
        li.textContent = `[${new Date().toLocaleTimeString()}] ${sender}: ${message}`;
        messagesList.appendChild(li);
        messagesList.scrollTop = messagesList.scrollHeight;
    }

    function updateClientList(clients) {
        clientList.innerHTML = '';
        if (clients && clients.length) {
            clients.forEach(client => {
                const li = document.createElement('li');
                li.textContent = client;
                clientList.appendChild(li);
            });
        } else {
            clientList.innerHTML = '<li>No active clients</li>';
        }
    }

    // Регистрация нового connectionId
    async function register() {
        registerErrorDiv.textContent = ''; // очищаем предыдущую ошибку
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Если нужно отправить какие-то данные (например, имя), добавь body
                // body: JSON.stringify({ name: 'test' })
            });
            if (!response.ok) {
                throw new Error(`Registration failed: ${response.status}`);
            }
            const data = await response.json();
            // Ожидаем, что сервер вернёт JSON вида { "connectionId": 12345 }
            if (data.connectionId) {
                connectionIdInput.value = data.connectionId;
                log('System', `New connection ID registered: ${data.connectionId}`);
                // Можно сразу подключиться, если хочешь:
                // connect();
            } else {
                throw new Error('Invalid response from server');
            }
        } catch (error) {
            registerErrorDiv.textContent = `Error: ${error.message}`;
        }
    }

    // Поддержка Enter для отправки
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Автоотключение при закрытии страницы
    window.addEventListener('beforeunload', () => {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.close(1000, 'Page closed');
        }
    });
</script>
</body>
</html>
