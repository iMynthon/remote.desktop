quarkus.http.host=192.168.0.82
quarkus.http.port=5679

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5679
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info

quarkus.application.name=remote-control
quarkus.application.version=1.0.0

quarkus.log.level=INFO
quarkus.log.category."jakarta.ws.rs".level=DEBUG

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.log.sql=true

quarkus.datasource.db-kind=PostgreSQL
quarkus.datasource.username=Mynthon
quarkus.datasource.password=remote
quarkus.datasource.jdbc.url=jdbc:postgresql://192.168.0.82:5436/remote_desktop

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations =db/migration
quarkus.flyway.clean-at-start=false
quarkus.flyway.default-schema=remote_schema